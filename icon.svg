<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: dark navy top-left to deeper navy bottom-right -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3480"/>
      <stop offset="100%" stop-color="#0b1448"/>
    </linearGradient>

    <!-- Arrow gradient: teal → blue-purple → purple -->
    <linearGradient id="arrowGrad" x1="175" y1="335" x2="345" y2="175" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#00c8d8"/>
      <stop offset="50%"  stop-color="#4444f0"/>
      <stop offset="100%" stop-color="#7838ee"/>
    </linearGradient>

    <!-- Clip used to create the crescent moon shape -->
    <clipPath id="moonClip">
      <circle cx="345" cy="257" r="15"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- ── Right purple arc  (behind, drawn first)
       Center (310, 256) radius 145, opens to the LEFT
       Opening corners at (199, 163) and (199, 349)
       Large arc, clockwise (sweep=1) ── -->
  <path d="M 199,163 A 145,145 0 1 1 199,349"
        fill="none" stroke="#6038e0" stroke-width="46" stroke-linecap="round"/>

  <!-- ── Left teal arc  (in front, drawn second)
       Center (205, 256) radius 145, opens to the RIGHT
       Opening corners at (316, 163) and (316, 349)
       Large arc, counter-clockwise (sweep=0) ── -->
  <path d="M 316,163 A 145,145 0 1 0 316,349"
        fill="none" stroke="#00c0d0" stroke-width="46" stroke-linecap="round"/>

  <!-- ── Diagonal gradient arrow (lower-left → upper-right)
       Computed as a 7-point polygon:
         shaft top-left  → shaft top-right end → left flange → tip → right flange → shaft bottom-right end → shaft bottom-left
       Arrow travels from approx (175,335) to tip at (345,175), half-width=20, head-half=38 ── -->
  <polygon
    points="161,320 295,194 283,181 345,175 335,237 323,224 189,350"
    fill="url(#arrowGrad)"/>

  <!-- ── Sun icon  (white starburst, inside left loop ~175,257) ── -->
  <g transform="translate(175,257)" fill="white" opacity="0.92">
    <circle r="7"/>
    <!-- 8 rays -->
    <line x1="0"   y1="-13" x2="0"   y2="-17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0"   y1=" 13" x2="0"   y2=" 17" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-13" y1="0"   x2="-17" y2="0"   stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1=" 13" y1="0"   x2=" 17" y2="0"   stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9"  y1="-9"  x2="-12" y2="-12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1=" 9"  y1="-9"  x2=" 12" y2="-12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-9"  y1=" 9"  x2="-12" y2=" 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1=" 9"  y1=" 9"  x2=" 12" y2=" 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- ── Moon crescent icon  (🌙 style, inside right loop ~345,257)
       Technique: clip a full white circle, then overlay a background-tinted circle
       shifted LEFT to subtract the left portion, leaving a right-facing crescent. ── -->
  <g clip-path="url(#moonClip)">
    <circle cx="345" cy="257" r="15" fill="white"   opacity="0.92"/>
    <circle cx="336" cy="257" r="12" fill="#0e1b5e" opacity="0.95"/>
  </g>

</svg>
